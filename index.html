<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Snake</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div>
          <h1>Infinite Snake</h1>
          <p>Swipe, tap the controls, or use arrow keys. Wrap around the edges and avoid yourself.</p>
        </div>

        <div class="score-row" aria-live="polite">
          <div class="score-board">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-board">
            <span>Best</span>
            <strong id="highScore">0</strong>
          </div>
        </div>
      </header>

      <section class="board-wrap" aria-label="Snake game">
        <canvas id="gameCanvas" width="640" height="640" aria-label="Snake game board"></canvas>

        <div class="game-overlay" id="gameOverlay">
          <div class="overlay-panel">
            <p class="overlay-kicker" id="overlayKicker">Ready</p>
            <h2 id="overlayTitle">Infinite Snake</h2>
            <p id="overlayMessage">Press Start, swipe, or choose a direction to begin.</p>
            <div class="overlay-actions">
              <button id="startButton" type="button">Start</button>
              <button id="overlayRestartButton" type="button">Restart</button>
            </div>
          </div>
        </div>
      </section>

      <section class="touch-controls" aria-label="Touch controls">
        <div class="direction-pad" aria-label="Direction controls">
          <button id="touchUpButton" class="touch-button touch-up" type="button" aria-label="Move up">
            Up
          </button>
          <button
            id="touchLeftButton"
            class="touch-button touch-left"
            type="button"
            aria-label="Move left"
          >
            Left
          </button>
          <button
            id="touchRightButton"
            class="touch-button touch-right"
            type="button"
            aria-label="Move right"
          >
            Right
          </button>
          <button
            id="touchDownButton"
            class="touch-button touch-down"
            type="button"
            aria-label="Move down"
          >
            Down
          </button>
        </div>
        <button id="touchPauseButton" class="touch-pause" type="button">Pause</button>
      </section>

    </main>

    <script src="script.js"></script>
  </body>
</html>
